# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    build:
      target: prod
    ports:
      - "8000:8000"
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
    restart: unless-stopped

  worker:
    build:
      target: prod
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
    restart: unless-stopped

  frontend:
    build:
      target: prod
    ports:
      - "3000:3000"
    volumes: []
    environment:
      - NEXT_PUBLIC_API_URL=${PROD_API_URL:-http://api:8000}
      - NEXT_PUBLIC_WS_URL=${PROD_WS_URL:-ws://api:8000}
    restart: unless-stopped

  postgres:
    ports: []
    environment:
      POSTGRES_USER: "${PROD_DB_USER:-yohas}"
      POSTGRES_PASSWORD: "${PROD_DB_PASSWORD}"
      POSTGRES_DB: "${PROD_DB_NAME:-yohas}"
    restart: unless-stopped

  redis:
    ports: []
    command: redis-server --requirepass "${PROD_REDIS_PASSWORD}"
    restart: unless-stopped

  mcp-gateway:
    ports: []
    environment:
      ENVIRONMENT: production
    restart: unless-stopped
